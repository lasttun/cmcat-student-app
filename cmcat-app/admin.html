<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการ | CMCAT Executive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; } </style>
</head>
<body class="pb-10 relative">
    
    <nav class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Executive Dashboard</h1>
                <p class="text-xs text-slate-400">สำหรับฝ่ายกิจการนักเรียน นักศึกษา</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <p class="font-bold text-sm text-blue-400 hidden md:block" id="current-date">วันข้อมูล: โหลดข้อมูล...</p>
            <button onclick="logout()" class="bg-slate-800 hover:bg-red-600 px-4 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                <span class="hidden sm:inline">ออกจากระบบ</span>
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-6 mt-4">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-blue-500">
                <p class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">นักเรียนทั้งหมด</p>
                <h2 id="kpi-total-stu" class="text-3xl font-extrabold text-slate-800">0</h2>
                <p class="text-[10px] text-slate-400 mt-1">คน</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-emerald-500">
                <p class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">เข้าแถววันนี้</p>
                <h2 id="kpi-att-percent" class="text-3xl font-extrabold text-emerald-600">0%</h2>
                <p id="kpi-att-text" class="text-[10px] text-emerald-500 mt-1">มา/สาย 0 จาก 0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-red-500">
                <p class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">ขาดเรียนวันนี้</p>
                <h2 id="kpi-absent" class="text-3xl font-extrabold text-red-600">0</h2>
                <p class="text-[10px] text-red-500 mt-1">คน ที่ต้องติดตาม</p>
            </div>
            <div class="bg-slate-800 p-5 rounded-2xl shadow-lg border border-slate-700">
                <p class="text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">ห้องที่เช็คชื่อแล้ว</p>
                <h2 id="kpi-rooms" class="text-3xl font-extrabold text-white">0<span class="text-lg text-slate-500">/0</span></h2>
                <p class="text-[10px] text-slate-400 mt-1">ห้องเรียน</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 relative">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="w-3 h-8 bg-blue-500 rounded-full"></span> สัดส่วนการมาเข้าแถววันนี้
                </h3>
                <div class="relative h-[250px] w-full flex justify-center">
                    <canvas id="attendanceChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 relative">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="w-3 h-8 bg-purple-500 rounded-full"></span> ภาพรวมความเสี่ยง (SDQ ล่าสุด)
                </h3>
                <div class="relative h-[250px] w-full flex justify-center">
                    <canvas id="sdqChart"></canvas>
                </div>
                <div class="absolute bottom-6 right-6 bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-bold border border-red-100 shadow-sm">
                    ⚠️ พบกลุ่มมีปัญหา <span id="alert-sdq-prob" class="text-lg">0</span> คน
                </div>
            </div>

        </div>

    </div>

    <script>
        // ⚠️ ใส่ API_URL ของคุณที่นี่
        const API_URL = "https://script.google.com/macros/s/AKfycbztsC4Wng1zDAVyNmHka6N00m1os6aHGqcZV2LW1l1NBrlATIWPLzwdORzU4lP_P6_p/exec"; 

        let attChartInstance = null;
        let sdqChartInstance = null;

        window.onload = async () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if(!currentUser || localStorage.getItem('currentRole') !== 'admin') {
                Swal.fire('ปฏิเสธการเข้าถึง', 'สำหรับผู้บริหารเท่านั้น', 'error').then(() => { window.location.href = "index.html"; });
                return;
            }
            await loadExecutiveData();
        };

        function logout() { localStorage.clear(); window.location.href = "index.html"; }

        async function loadExecutiveData() {
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                    body: JSON.stringify({ action: 'getExecutiveSummary' }) 
                });
                const result = await res.json();
                
                if (result.success) {
                    const d = result.data;
                    document.getElementById('current-date').innerText = `ข้อมูล ณ วันที่: ${d.todayDate}`;

                    // Update KPI Cards
                    document.getElementById('kpi-total-stu').innerText = d.totalStudents;
                    
                    const attTotal = d.attendance.present + d.attendance.late + d.attendance.leave + d.attendance.absent;
                    const activeAtt = d.attendance.present + d.attendance.late + d.attendance.leave;
                    const attPercent = attTotal > 0 ? Math.round((activeAtt / attTotal) * 100) : 0;
                    
                    document.getElementById('kpi-att-percent').innerText = attPercent + '%';
                    document.getElementById('kpi-att-text').innerText = `มา/สาย/ลา ${activeAtt} จากที่เช็คแล้ว ${attTotal} คน`;
                    document.getElementById('kpi-absent').innerText = d.attendance.absent;
                    document.getElementById('kpi-rooms').innerHTML = `${d.checkedRoomsCount}<span class="text-lg text-slate-500">/${d.totalRooms}</span>`;

                    document.getElementById('alert-sdq-prob').innerText = d.sdq.problem;

                    // Render Charts
                    renderCharts(d.attendance, d.sdq);
                }
            } catch (err) {
                console.error("Failed to load dashboard:", err);
                alert("ไม่สามารถดึงข้อมูลได้");
            }
        }

        function renderCharts(att, sdq) {
            Chart.defaults.font.family = "'Prompt', sans-serif";

            // 1. Attendance Donut Chart
            if (attChartInstance) attChartInstance.destroy();
            const ctxAtt = document.getElementById('attendanceChart').getContext('2d');
            attChartInstance = new Chart(ctxAtt, {
                type: 'doughnut',
                data: {
                    labels: ['มา', 'สาย', 'ลา', 'ขาด'],
                    datasets: [{
                        data: [att.present, att.late, att.leave, att.absent],
                        backgroundColor: ['#10b981', '#f97316', '#eab308', '#ef4444'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'right' } },
                    cutout: '70%'
                }
            });

            // 2. SDQ Pie Chart
            if (sdqChartInstance) sdqChartInstance.destroy();
            const ctxSdq = document.getElementById('sdqChart').getContext('2d');
            sdqChartInstance = new Chart(ctxSdq, {
                type: 'pie',
                data: {
                    labels: ['ปกติ', 'เสี่ยง', 'มีปัญหา'],
                    datasets: [{
                        data: [sdq.normal, sdq.risk, sdq.problem],
                        backgroundColor: ['#3b82f6', '#f59e0b', '#ef4444'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'right' } }
                }
            });
        }
    </script>
</body>
</html>
