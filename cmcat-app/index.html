<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMCAT Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="login-page" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <h2 class="text-3xl font-bold text-emerald-700 mb-6 text-center">เข้าสู่ระบบนักเรียน</h2>
            <input type="text" id="login-id" placeholder="รหัสนักเรียน" class="w-full p-4 mb-4 border rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <input type="password" id="login-pass" placeholder="รหัสผ่าน" class="w-full p-4 mb-6 border rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
            <button onclick="handleLogin()" id="btn-login" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold hover:bg-emerald-700 transition-all">เข้าใช้งาน</button>
            <p class="mt-4 text-center text-slate-500">ยังไม่มีบัญชี? <a href="javascript:void(0)" onclick="showPage('reg-page')" class="text-emerald-600 font-bold">สมัครสมาชิก</a></p>
        </div>
    </div>

    <div id="reg-page" class="hidden flex items-center justify-center min-h-screen py-10">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <h2 class="text-2xl font-bold text-emerald-700 mb-6 text-center">สมัครสมาชิกใหม่</h2>
            <input type="text" id="reg-id" placeholder="รหัสนักเรียน" class="w-full p-4 mb-4 border rounded-xl outline-none">
            <input type="text" id="reg-name" placeholder="ชื่อ-นามสกุล" class="w-full p-4 mb-4 border rounded-xl outline-none">
            <input type="text" id="reg-level" placeholder="ระดับชั้น (เช่น ปวช.1/1)" class="w-full p-4 mb-4 border rounded-xl outline-none">
            <input type="password" id="reg-pass" placeholder="ตั้งรหัสผ่าน" class="w-full p-4 mb-6 border rounded-xl outline-none">
            <button onclick="handleRegister()" id="btn-reg" class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-black transition-all">ลงทะเบียน</button>
            <button onclick="showPage('login-page')" class="w-full mt-2 text-slate-500 p-2 text-sm">ย้อนกลับ</button>
        </div>
    </div>

    <div id="dash-page" class="hidden">
        <nav class="bg-emerald-700 text-white p-4 shadow-lg flex justify-between items-center">
            <span class="font-bold">ระบบนักเรียน CMCAT</span>
            <button onclick="location.reload()" class="text-xs bg-emerald-800 px-3 py-1 rounded">ออกจากระบบ</button>
        </nav>
        <div class="container mx-auto p-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border-l-8 border-emerald-500">
                <h3 id="user-display" class="text-xl font-bold text-slate-800">ยินดีต้อนรับ</h3>
                <p id="level-display" class="text-slate-500">ข้อมูลกำลังโหลด...</p>
            </div>
            
            <h4 class="font-bold text-slate-700 mb-4">ประวัติการเช็คชื่อ</h4>
            <div id="history-list" class="space-y-3">
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // ⚠️ API_URL ของคุณ (ถูกต้องแล้ว)
        const API_URL = "https://script.google.com/macros/s/AKfycbztsC4Wng1zDAVyNmHka6N00m1os6aHGqcZV2LW1l1NBrlATIWPLzwdORzU4lP_P6_p/exec"; 

        function showPage(pageId) {
            ['login-page', 'reg-page', 'dash-page'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        }

        // ==========================================
        // 🔐 ระบบเข้าสู่ระบบ (รองรับทั้งนักเรียนและครู)
        // ==========================================
        async function handleLogin() {
            const studentId = document.getElementById('login-id').value;
            const password = document.getElementById('login-pass').value;
            
            if(!studentId || !password) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');

            toggleBtn('btn-login', true);
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: 'login', studentId, password })
                });
                const data = await res.json();
                
                if(data.success) {
                    // 💾 บันทึกข้อมูลผู้ใช้ลงในเบราว์เซอร์ เพื่อเอาไปใช้หน้าอื่นต่อได้
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    localStorage.setItem('currentRole', data.role);

                    // 🎓 กรณี: นักเรียนล็อกอิน
                    if (data.role === 'student') {
                        document.getElementById('user-display').innerText = `สวัสดี, ${data.user.name}`;
                        document.getElementById('level-display').innerText = `ระดับชั้น: ${data.user.level}`;
                        showPage('dash-page');
                        loadHistory(studentId);
                    } 
                    // 👨‍🏫 กรณี: คุณครูล็อกอิน
                    else if (data.role === 'teacher') {
                        Swal.fire({
                            icon: 'success',
                            title: 'สวัสดีครับคุณครู',
                            text: `เข้าสู่ระบบในชื่อ: ${data.user.name}`,
                            timer: 2000,
                            showConfirmButton: false
                        }).then(() => {
                            // 🚀 [ทางเลือก] ถ้าคุณมีลิงก์ระบบเช็คชื่อครูอยู่แล้ว (เช่น ats.cmcat.ac.th) 
                            // ให้เปิดคอมเมนต์บรรทัดข้างล่างแล้วใส่ URL ลงไป ระบบจะเด้งไปหน้าครูอัตโนมัติครับ
                            window.location.href = "teacher.html";
                            
                            // ชั่วคราว: แสดงหน้า Dashboard แบบของครู
                            document.getElementById('user-display').innerText = `สวัสดีคุณครู, ${data.user.name}`;
                            document.getElementById('level-display').innerText = `ตำแหน่ง: ${data.user.position}`;
                            showPage('dash-page');
                            document.getElementById('history-list').innerHTML = `
                                <div class="bg-emerald-50 border border-emerald-200 text-emerald-700 p-4 rounded-xl text-center">
                                    <p class="font-bold">เข้าสู่โหมดครูที่ปรึกษา</p>
                                    <p class="text-sm mt-2">เมนูการเช็คชื่อนักเรียนกำลังจะถูกนำมารวมที่นี่ในอนาคต</p>
                                </div>
                            `;
                        });
                    }
                } else {
                    Swal.fire('ผิดพลาด', data.message, 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            } finally {
                toggleBtn('btn-login', false);
            }
        }

        // ==========================================
        // 📝 ระบบสมัครสมาชิก (สำหรับนักเรียนเท่านั้น)
        // ==========================================
        async function handleRegister() {
            const payload = {
                action: 'register',
                studentId: document.getElementById('reg-id').value,
                name: document.getElementById('reg-name').value,
                level: document.getElementById('reg-level').value,
                password: document.getElementById('reg-pass').value
            };
            
            if(!payload.studentId || !payload.password) return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสและรหัสผ่าน', 'warning');

            toggleBtn('btn-reg', true);
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload) 
                });
                const data = await res.json();
                
                if(data.success) {
                    Swal.fire('สำเร็จ', data.message, 'success').then(() => showPage('login-page'));
                    // เคลียร์ค่าในฟอร์มหลังสมัครเสร็จ
                    document.getElementById('reg-id').value = '';
                    document.getElementById('reg-name').value = '';
                    document.getElementById('reg-level').value = '';
                    document.getElementById('reg-pass').value = '';
                } else {
                    Swal.fire('ผิดพลาด', data.message, 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            } finally {
                toggleBtn('btn-reg', false);
            }
        }

        // ==========================================
        // 📊 ระบบดึงประวัติการเช็คชื่อ (สำหรับนักเรียน)
        // ==========================================
        async function loadHistory(studentId) {
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: 'getHistory', studentId }) 
                });
                const result = await res.json();
                const list = document.getElementById('history-list');
                
                if(!result.data || result.data.length === 0) {
                    list.innerHTML = '<p class="text-slate-400">ยังไม่มีประวัติการเช็คชื่อ</p>';
                } else {
                    list.innerHTML = result.data.map(row => `
                        <div class="bg-white p-4 rounded-xl shadow-sm border flex justify-between items-center">
                            <div>
                                <p class="font-bold text-slate-700">${new Date(row[0]).toLocaleDateString('th-TH')}</p>
                                <p class="text-xs text-slate-400">ครูผู้เช็ค: ${row[2]}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${row[5] === 'มา' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}">${row[5]}</span>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error("โหลดประวัติไม่ได้", err);
            }
        }

        // ==========================================
        // 🔄 เอฟเฟกต์ปุ่มโหลด
        // ==========================================
        function toggleBtn(id, loading) {
            const btn = document.getElementById(id);
            btn.disabled = loading;
            btn.innerText = loading ? 'กำลังประมวลผล...' : (id === 'btn-login' ? 'เข้าใช้งาน' : 'ลงทะเบียน');
            if(loading) {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
