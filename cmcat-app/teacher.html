<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบครูที่ปรึกษา | CMCAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-emerald-700 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="font-bold text-lg">👨‍🏫 ระบบครูที่ปรึกษา | <span id="teacher-name-display" class="text-emerald-200"></span></div>
        <button onclick="logout()" class="text-sm bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-bold transition-all shadow-sm">ออกจากระบบ</button>
    </nav>

    <div class="max-w-5xl mx-auto p-6 mt-4">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6">
            <h2 class="text-xl mb-4 font-bold text-slate-700">1. เลือกห้องเรียนที่ต้องการเช็คชื่อ / ดูผล SDQ</h2>
            <select id="room-select" onchange="loadStudents()" class="border-2 border-emerald-100 focus:border-emerald-500 focus:ring-0 p-3 rounded-xl w-full max-w-sm outline-none text-slate-700 bg-slate-50 font-medium">
                <option value="">กำลังโหลดข้อมูลห้องเรียน...</option>
            </select>
        </div>
        
        <div id="students-container">
            <div class="text-center text-slate-400 py-10 border-2 border-dashed border-slate-200 rounded-2xl bg-white">
                กรุณาเลือกห้องเรียนเพื่อแสดงรายชื่อนักเรียน
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ตรวจสอบสิทธิ์ (Security Check)
        // ==========================================
        const currentRole = localStorage.getItem('currentRole');
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if(currentRole !== 'teacher' || !currentUser) {
            window.location.href = "index.html"; // เตะกลับไปหน้าแรกถ้าไม่ได้ล็อกอินเป็นครู
        }

        document.getElementById('teacher-name-display').innerText = currentUser.name;

        // ==========================================
        // 2. ตั้งค่าการเชื่อมต่อ (API)
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbztsC4Wng1zDAVyNmHka6N00m1os6aHGqcZV2LW1l1NBrlATIWPLzwdORzU4lP_P6_p/exec";
        
        // ตัวแปรเก็บรายชื่อนักเรียนปัจจุบัน เพื่อเตรียมส่งบันทึก
        let currentStudentsData = [];

// ==========================================
        // 3. ฟังก์ชันดึงข้อมูล (Fetch Data)
        // ==========================================
        
        // 🟢 ดึงรายการห้องจากข้อมูลครูที่ล็อกอิน (ไม่ต้องยิง API แล้ว เร็วขึ้น 100%)
        function fetchRooms() {
            const select = document.getElementById('room-select');
            const container = document.getElementById('students-container');
            
            // ดึงรายชื่อห้องจาก currentUser ที่เราบันทึกไว้ตอนล็อกอิน (ต้องเพิ่มใน Sheet Teachers คอลัมน์ F)
            const myRooms = currentUser.rooms || []; 
            
            if(myRooms.length === 0) {
                select.innerHTML = '<option value="">-- คุณยังไม่มีห้องที่ปรึกษา --</option>';
                container.innerHTML = '<div class="text-center text-slate-400 py-10 border-2 border-dashed border-slate-200 rounded-2xl bg-white">กรุณาติดต่อแอดมินเพื่อเพิ่ม "ห้องที่ปรึกษา" ให้ท่านในระบบฐานข้อมูล</div>';
                select.disabled = true; // ล็อคปุ่มกด
                return;
            }

            // สร้างตัวเลือกเฉพาะห้องของครูคนนี้
            select.innerHTML = '<option value="">-- เลือกห้องเรียน --</option>' + 
                               myRooms.map(room => `<option value="${room}">${room}</option>`).join('');
            
            // 🌟 ความเจ๋ง: ถ้าครูดูแลแค่ "ห้องเดียว" ให้เลือกระบบห้องให้เลย แล้วโหลดรายชื่อเด็กอัตโนมัติ!
            if(myRooms.length === 1) {
                select.value = myRooms[0];
                loadStudents(); // เรียกฟังก์ชันโหลดเด็กเลย ไม่ต้องรอครูกด
            }
        }

        // ดึงรายชื่อนักเรียน + ผล SDQ (เหมือนเดิม)
        async function loadStudents() {
            const roomString = document.getElementById('room-select').value;
            const container = document.getElementById('students-container');
            
            if(!roomString) {
                container.innerHTML = '<div class="text-center text-slate-400 py-10 border-2 border-dashed border-slate-200 rounded-2xl bg-white">กรุณาเลือกห้องเรียนเพื่อแสดงรายชื่อนักเรียน</div>';
                return;
            }

            container.innerHTML = `<div class="text-center py-10"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-700 mx-auto mb-4"></div><p class="text-emerald-700 font-bold">กำลังดึงข้อมูล...</p></div>`;

            try {
                // ยิง API 2 ตัวพร้อมกัน (เพื่อความรวดเร็ว): 1. ดึงชื่อเด็ก 2. ดึงผล SDQ ห้องนี้
                const [resStudents, resSDQ] = await Promise.all([
                    fetch(API_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'getStudentsInRoom', roomString }) }),
                    fetch(API_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'getSDQDashboard', roomString }) })
                ]);

                const dataStudents = await resStudents.json();
                const dataSDQ = await resSDQ.json();
                
                if(dataStudents.success) {
                    // ตั้งค่าเริ่มต้นการเช็คชื่อเป็น "มา" ให้ทุกคน
                    currentStudentsData = dataStudents.data.map(s => ({ ...s, status: 'มา' }));
                    
                    // นำผล SDQ มาจัดกลุ่มตามรหัสนักเรียน จะได้ค้นหาง่ายๆ
                    const sdqMap = {};
                    if(dataSDQ.success && dataSDQ.data) {
                        dataSDQ.data.forEach(item => { sdqMap[item.id] = item; });
                    }

                    // ส่งไปสร้างตาราง
                    renderTable(currentStudentsData, sdqMap);
                }
            } catch (err) {
                container.innerHTML = '<p class="text-red-500 text-center py-10">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        }

        // ==========================================
        // 4. ฟังก์ชันสร้างตาราง (Render UI)
        // ==========================================
        function renderTable(students, sdqMap) {
            let html = `
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead>
                            <tr class="bg-emerald-800 text-emerald-50 text-sm tracking-wide">
                                <th class="p-4 border-b border-emerald-700 text-center w-16">ลำดับ</th>
                                <th class="p-4 border-b border-emerald-700 w-24">รหัส</th>
                                <th class="p-4 border-b border-emerald-700 min-w-[200px]">ชื่อ-สกุล</th>
                                <th class="p-4 border-b border-emerald-700 text-center min-w-[250px]">เช็คชื่อ (แถวเสาธง)</th>
                                <th class="p-4 border-b border-emerald-700 text-center">Dashboard SDQ</th>
                            </tr>
                        </thead>
                        <tbody class="text-slate-700 text-sm">
            `;

            students.forEach((s, index) => {
                // เช็คว่าเด็กคนนี้มีผล SDQ หรือยัง
                const sdq = sdqMap[s.id];
                let sdqBadge = '<span class="text-slate-300 text-xs">- ยังไม่ประเมิน -</span>';
                
                if(sdq) {
                    // กำหนดสีป้ายตามสถานะ
                    let colorClass = 'bg-slate-100 text-slate-700';
                    if(sdq.status === 'ปกติ') colorClass = 'bg-green-100 text-green-700 border-green-200';
                    if(sdq.status === 'เสี่ยง') colorClass = 'bg-yellow-100 text-yellow-700 border-yellow-200';
                    if(sdq.status === 'มีปัญหา') colorClass = 'bg-red-100 text-red-700 border-red-200';
                    
                    sdqBadge = `
                        <div class="flex flex-col items-center justify-center gap-1">
                            <span class="px-3 py-1 rounded-full text-xs font-bold border ${colorClass}">
                                ${sdq.status} (${sdq.totalScore} คะแนน)
                            </span>
                            <span class="text-[10px] text-slate-400">ประเมินโดย: ${sdq.evaluator}</span>
                        </div>
                    `;
                }

                html += `
                    <tr class="border-b border-slate-50 hover:bg-emerald-50 transition-colors">
                        <td class="p-4 text-center text-slate-400">${index + 1}</td>
                        <td class="p-4 font-mono text-slate-500">${s.id}</td>
                        <td class="p-4 font-medium text-slate-800">${s.name}</td>
                        <td class="p-4">
                            <div class="flex justify-center gap-3">
                                <label class="cursor-pointer flex items-center gap-1 hover:text-emerald-600 transition-colors">
                                    <input type="radio" name="att_${s.id}" value="มา" checked onchange="updateStatus(${index}, 'มา')" class="accent-emerald-600 w-4 h-4"> มา
                                </label>
                                <label class="cursor-pointer flex items-center gap-1 hover:text-orange-500 transition-colors">
                                    <input type="radio" name="att_${s.id}" value="สาย" onchange="updateStatus(${index}, 'สาย')" class="accent-orange-500 w-4 h-4"> สาย
                                </label>
                                <label class="cursor-pointer flex items-center gap-1 hover:text-blue-500 transition-colors">
                                    <input type="radio" name="att_${s.id}" value="ลา" onchange="updateStatus(${index}, 'ลา')" class="accent-blue-500 w-4 h-4"> ลา
                                </label>
                                <label class="cursor-pointer flex items-center gap-1 hover:text-red-600 transition-colors">
                                    <input type="radio" name="att_${s.id}" value="ขาด" onchange="updateStatus(${index}, 'ขาด')" class="accent-red-600 w-4 h-4"> ขาด
                                </label>
                            </div>
                        </td>
                        <td class="p-4 align-middle">
                            ${sdqBadge}
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="mt-8 flex justify-center">
                <button onclick="submitAttendance()" id="btn-save" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-10 rounded-full shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all flex items-center gap-2 text-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                    บันทึกการเช็คชื่อทั้งหมด
                </button>
            </div>
            `;
            document.getElementById('students-container').innerHTML = html;
        }

        // อัปเดตค่าสถานะเมื่อครูกดเปลี่ยนปุ่ม Radio
        function updateStatus(index, status) {
            currentStudentsData[index].status = status;
        }

        // ==========================================
        // 5. ฟังก์ชันส่งข้อมูล (Submit)
        // ==========================================
        async function submitAttendance() {
            if(currentStudentsData.length === 0) return;

            const btn = document.getElementById('btn-save');
            btn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> กำลังบันทึก...';
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ 
                        action: 'saveAttendance', 
                        records: currentStudentsData,
                        teacherName: currentUser.name // ดึงชื่อครูจาก LocalStorage
                    })
                });
                const result = await res.json();
                
                if(result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ!',
                        text: `เช็คชื่อนักเรียน ${result.count} คน เรียบร้อยแล้ว`,
                        confirmButtonColor: '#059669'
                    });
                } else {
                    Swal.fire('ผิดพลาด', result.message, 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            } finally {
                btn.innerHTML = '💾 บันทึกการเช็คชื่อทั้งหมด';
                btn.disabled = false;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        // เรียกดึงข้อมูลห้องตอนเปิดหน้าเว็บครั้งแรก
        window.onload = fetchRooms;
    </script>
</body>
</html>
