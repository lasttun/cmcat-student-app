<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบครูที่ปรึกษา | CMCAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Prompt', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 relative">

    <nav class="bg-emerald-700 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-40">
        <div class="font-bold text-lg">👨‍🏫 ระบบครูที่ปรึกษา | <span id="teacher-name-display" class="text-emerald-200"></span></div>
        <button onclick="logout()" class="text-sm bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-bold transition-all shadow-sm">ออกจากระบบ</button>
    </nav>

    <div class="max-w-6xl mx-auto p-6 mt-4">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6">
            <h2 class="text-xl mb-4 font-bold text-slate-700">1. เลือกห้องเรียนที่ต้องการจัดการ</h2>
            <select id="room-select" onchange="loadStudents()" class="border-2 border-emerald-100 focus:border-emerald-500 focus:ring-0 p-3 rounded-xl w-full max-w-sm outline-none text-slate-700 bg-slate-50 font-medium">
                <option value="">กำลังโหลดข้อมูลห้องเรียน...</option>
            </select>
        </div>
        
        <div id="students-container">
            <div class="text-center text-slate-400 py-10 border-2 border-dashed border-slate-200 rounded-2xl bg-white">
                กรุณาเลือกห้องเรียนเพื่อแสดงรายชื่อนักเรียน
            </div>
        </div>
    </div>

    <div id="deep-data-modal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-70 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-5xl max-h-[90vh] flex flex-col shadow-2xl">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-3xl">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">วิเคราะห์ข้อมูล SDQ เชิงลึก</h2>
                    <p id="modal-student-name" class="text-emerald-600 font-bold mt-1 text-lg"></p>
                </div>
                <button onclick="closeDeepData()" class="text-slate-400 hover:text-red-500 font-bold text-xl px-4 py-2">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 flex flex-col lg:flex-row gap-6">
                <div class="flex-1 bg-white border border-slate-100 p-6 rounded-2xl shadow-sm">
                    <h3 class="font-bold text-slate-700 mb-4 text-lg border-b pb-2">📊 เปรียบเทียบผลประเมินรายด้าน</h3>
                    <div id="deep-data-content" class="min-h-[200px] flex items-center justify-center text-slate-400">
                        กำลังโหลดข้อมูล...
                    </div>
                </div>

                <div class="w-full lg:w-[400px] bg-emerald-50 border border-emerald-100 p-6 rounded-2xl shadow-sm">
                    <h3 class="font-bold text-emerald-800 mb-2 text-lg">👨‍🏫 ครูประเมินนักเรียน</h3>
                    <p class="text-sm text-emerald-600 mb-4 pb-2 border-b border-emerald-200">ประเมินนักเรียนเพื่อเปรียบเทียบกับข้อมูลที่นักเรียนประเมินตนเอง</p>
                    
                    <form id="teacher-sdq-form" class="space-y-4 max-h-[40vh] overflow-y-auto pr-2">
                        </form>
                    
                    <div class="mt-6">
                        <button onclick="submitTeacherSDQ()" id="btn-submit-teacher-sdq" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-4 rounded-xl font-bold shadow-lg transition-all">
                            บันทึกผลประเมิน
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const currentRole = localStorage.getItem('currentRole');
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if(currentRole !== 'teacher' || !currentUser) {
            window.location.href = "index.html"; 
        }

        document.getElementById('teacher-name-display').innerText = currentUser.name;

        // ⚠️ API_URL
        const API_URL = "https://script.google.com/macros/s/AKfycbztsC4Wng1zDAVyNmHka6N00m1os6aHGqcZV2LW1l1NBrlATIWPLzwdORzU4lP_P6_p/exec";
        
        let currentStudentsData = [];
        let currentViewingStudent = null; // เก็บข้อมูลเด็กที่กำลังเปิดดู Deep Data
        let chartInstance = null; // ตัวแปรเก็บกราฟ

        // คำถาม SDQ 25 ข้อ
        const sdqQuestions = [
            "ห่วงใยความรู้สึกคนอื่น", "อยู่ไม่นิ่ง นั่งเฉยๆ ไม่ได้", "บ่นว่าปวดหัว ปวดท้องบ่อยๆ",
            "เต็มใจแบ่งปันสิ่งของให้เพื่อน", "มักจะอาละวาด หรือโมโหร้าย", "ชอบอยู่ตามลำพัง",
            "เชื่อฟังผู้อื่น", "กังวลใจหลายเรื่อง", "เป็นที่พึ่งได้เวลาคนอื่นมีปัญหา",
            "อยู่ไม่สุข ยุกยิก", "มีเพื่อนสนิท", "มักจะมีเรื่องทะเลาะวิวาท",
            "ดูเศร้าหมอง ท้อแท้", "เป็นที่ชื่นชอบของเพื่อน", "วอกแวกง่าย",
            "เครียดในสถานการณ์ที่ไม่คุ้นเคย", "ใจดีกับเด็กที่เล็กกว่า", "มักจะโกหกหรือขี้โกง",
            "ถูกเด็กคนอื่นแกล้ง", "ชอบอาสาช่วยเหลือผู้อื่น", "คิดก่อนทำ",
            "แอบหยิบของคนอื่น", "เข้ากับผู้ใหญ่ได้ดีกว่าเด็กวัยเดียวกัน", "ขี้กลัว", "ทำงานได้จนเสร็จ"
        ];

        function fetchRooms() {
            const select = document.getElementById('room-select');
            const container = document.getElementById('students-container');
            const myRooms = currentUser.rooms || []; 
            
            if(myRooms.length === 0) {
                select.innerHTML = '<option value="">-- คุณยังไม่มีห้องที่ปรึกษา --</option>';
                container.innerHTML = '<div class="text-center text-slate-400 py-10 border-2 border-dashed border-slate-200 rounded-2xl bg-white">กรุณาติดต่อแอดมินเพื่อเพิ่ม "ห้องที่ปรึกษา" ให้ท่านในระบบฐานข้อมูล</div>';
                select.disabled = true;
                return;
            }

            select.innerHTML = '<option value="">-- เลือกห้องเรียน --</option>' + 
                               myRooms.map(room => `<option value="${room}">${room}</option>`).join('');
            
            if(myRooms.length === 1) {
                select.value = myRooms[0];
                loadStudents();
            }
        }

        async function loadStudents() {
            const roomString = document.getElementById('room-select').value;
            const container = document.getElementById('students-container');
            
            if(!roomString) {
                container.innerHTML = '<div class="text-center text-slate-400 py-10 border-2 border-dashed border-slate-200 rounded-2xl bg-white">กรุณาเลือกห้องเรียนเพื่อแสดงรายชื่อนักเรียน</div>';
                return;
            }

            container.innerHTML = `<div class="text-center py-10"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-700 mx-auto mb-4"></div><p class="text-emerald-700 font-bold">กำลังดึงข้อมูล...</p></div>`;

            try {
                const [resStudents, resSDQ] = await Promise.all([
                    fetch(API_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'getStudentsInRoom', roomString }) }),
                    fetch(API_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'getSDQDashboard', roomString }) })
                ]);

                const dataStudents = await resStudents.json();
                const dataSDQ = await resSDQ.json();
                
                if(dataStudents.success) {
                    currentStudentsData = dataStudents.data.map(s => ({ ...s, status: 'มา' }));
                    const sdqMap = {};
                    if(dataSDQ.success && dataSDQ.data) {
                        dataSDQ.data.forEach(item => { 
                            // เก็บประเมินล่าสุดของแต่ละคนไว้แสดงหน้าแรก
                            if(!sdqMap[item.id]) sdqMap[item.id] = item; 
                        });
                    }
                    renderTable(currentStudentsData, sdqMap);
                }
            } catch (err) {
                container.innerHTML = '<p class="text-red-500 text-center py-10">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        }

        function renderTable(students, sdqMap) {
            let html = `
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead>
                            <tr class="bg-emerald-800 text-emerald-50 text-sm tracking-wide">
                                <th class="p-4 border-b border-emerald-700 text-center w-16">ลำดับ</th>
                                <th class="p-4 border-b border-emerald-700 w-24">รหัส</th>
                                <th class="p-4 border-b border-emerald-700 min-w-[200px]">ชื่อ-สกุล</th>
                                <th class="p-4 border-b border-emerald-700 text-center min-w-[250px]">เช็คชื่อ (แถวเสาธง)</th>
                                <th class="p-4 border-b border-emerald-700 text-center">การประเมิน (SDQ)</th>
                            </tr>
                        </thead>
                        <tbody class="text-slate-700 text-sm">
            `;

            students.forEach((s, index) => {
                const sdq = sdqMap[s.id];
                let sdqBadge = '';
                
                if(sdq) {
                    let colorClass = 'bg-slate-100 text-slate-700';
                    if(sdq.status === 'ปกติ') colorClass = 'bg-green-100 text-green-700 border-green-200';
                    if(sdq.status === 'เสี่ยง') colorClass = 'bg-yellow-100 text-yellow-700 border-yellow-200';
                    if(sdq.status === 'มีปัญหา') colorClass = 'bg-red-100 text-red-700 border-red-200';
                    
                    sdqBadge = `<span class="px-2 py-1 rounded-full text-[10px] font-bold border mb-1 ${colorClass}">${sdq.status} (${sdq.totalScore})</span>`;
                } else {
                    sdqBadge = `<span class="text-[10px] text-slate-400 mb-1">- ยังไม่เคยประเมิน -</span>`;
                }

                html += `
                    <tr class="border-b border-slate-50 hover:bg-emerald-50 transition-colors">
                        <td class="p-4 text-center text-slate-400">${index + 1}</td>
                        <td class="p-4 font-mono text-slate-500">${s.id}</td>
                        <td class="p-4 font-medium text-slate-800">${s.name}</td>
                        <td class="p-4">
                            <div class="flex justify-center gap-3">
                                <label class="cursor-pointer flex items-center gap-1 hover:text-emerald-600 transition-colors">
                                    <input type="radio" name="att_${s.id}" value="มา" checked onchange="updateStatus(${index}, 'มา')" class="accent-emerald-600 w-4 h-4"> มา
                                </label>
                                <label class="cursor-pointer flex items-center gap-1 hover:text-orange-500 transition-colors">
                                    <input type="radio" name="att_${s.id}" value="สาย" onchange="updateStatus(${index}, 'สาย')" class="accent-orange-500 w-4 h-4"> สาย
                                </label>
                                <label class="cursor-pointer flex items-center gap-1 hover:text-blue-500 transition-colors">
                                    <input type="radio" name="att_${s.id}" value="ลา" onchange="updateStatus(${index}, 'ลา')" class="accent-blue-500 w-4 h-4"> ลา
                                </label>
                                <label class="cursor-pointer flex items-center gap-1 hover:text-red-600 transition-colors">
                                    <input type="radio" name="att_${s.id}" value="ขาด" onchange="updateStatus(${index}, 'ขาด')" class="accent-red-600 w-4 h-4"> ขาด
                                </label>
                            </div>
                        </td>
                        <td class="p-4 align-middle">
                            <div class="flex flex-col items-center gap-1">
                                ${sdqBadge}
                                <button onclick="openDeepData('${s.id}', '${s.name}')" class="bg-indigo-500 hover:bg-indigo-600 text-white text-[11px] px-3 py-1.5 rounded-lg font-bold w-full transition-all flex items-center justify-center gap-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                                    วิเคราะห์ & ประเมิน
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div></div>
            <div class="mt-8 flex justify-center">
                <button onclick="submitAttendance()" id="btn-save" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-10 rounded-full shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all flex items-center gap-2 text-lg">
                    💾 บันทึกการเช็คชื่อทั้งหมด
                </button>
            </div>`;
            document.getElementById('students-container').innerHTML = html;
        }

        function updateStatus(index, status) {
            currentStudentsData[index].status = status;
        }

        async function submitAttendance() {
            if(currentStudentsData.length === 0) return;
            const btn = document.getElementById('btn-save');
            btn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> กำลังบันทึก...';
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: 'saveAttendance', records: currentStudentsData, teacherName: currentUser.name })
                });
                const result = await res.json();
                
                if(result.success) {
                    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', text: `เช็คชื่อนักเรียน ${result.count} คน เรียบร้อยแล้ว`, confirmButtonColor: '#059669' });
                } else {
                    Swal.fire('ผิดพลาด', result.message, 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            } finally {
                btn.innerHTML = '💾 บันทึกการเช็คชื่อทั้งหมด';
                btn.disabled = false;
            }
        }

        // ==========================================
        // 📊 ระบบ Deep Data & ครูประเมิน
        // ==========================================
        async function openDeepData(studentId, studentName) {
            currentViewingStudent = { id: studentId, name: studentName };
            document.getElementById('modal-student-name').innerText = `รหัส: ${studentId} | ชื่อ: ${studentName}`;
            document.getElementById('deep-data-modal').classList.remove('hidden');
            
            // สร้างฟอร์มให้ครูประเมิน
            const form = document.getElementById('teacher-sdq-form');
            form.innerHTML = sdqQuestions.map((q, i) => `
                <div class="bg-white p-3 rounded-xl border border-emerald-100 text-sm">
                    <p class="font-medium text-slate-700 mb-2">${i+1}. ${q}</p>
                    <div class="flex gap-2">
                        <label class="flex-1 text-center border border-slate-200 p-1.5 rounded cursor-pointer hover:bg-emerald-50 has-[:checked]:bg-emerald-100 has-[:checked]:border-emerald-500 text-[11px]"><input type="radio" name="tq${i}" value="0" class="hidden" required> ไม่จริง</label>
                        <label class="flex-1 text-center border border-slate-200 p-1.5 rounded cursor-pointer hover:bg-emerald-50 has-[:checked]:bg-emerald-100 has-[:checked]:border-emerald-500 text-[11px]"><input type="radio" name="tq${i}" value="1" class="hidden"> จริงบ้าง</label>
                        <label class="flex-1 text-center border border-slate-200 p-1.5 rounded cursor-pointer hover:bg-emerald-50 has-[:checked]:bg-emerald-100 has-[:checked]:border-emerald-500 text-[11px]"><input type="radio" name="tq${i}" value="2" class="hidden"> จริงแน่นอน</label>
                    </div>
                </div>
            `).join('');

            // โหลดข้อมูล Deep Data
            const contentBox = document.getElementById('deep-data-content');
            contentBox.innerHTML = '<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-700"></div>';
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: 'getStudentDeepData', studentId })
                });
                const result = await res.json();
                
                if(result.success && result.data.length > 0) {
                    drawComparisonChart(result.data);
                } else {
                    contentBox.innerHTML = '<p class="text-slate-400">ยังไม่มีข้อมูลการประเมินของนักเรียนคนนี้</p>';
                }
            } catch (err) {
                contentBox.innerHTML = '<p class="text-red-500">ไม่สามารถโหลดข้อมูลได้</p>';
            }
        }

        function drawComparisonChart(dataArray) {
            // แยกข้อมูล เด็กทำ vs ครูทำ (เอาอันล่าสุด)
            const studentEval = dataArray.filter(d => d.evaluator === 'นักเรียนประเมินตนเอง').pop();
            const teacherEval = dataArray.filter(d => d.evaluator !== 'นักเรียนประเมินตนเอง').pop();

            let html = '<div class="space-y-4 w-full">';

            if(studentEval) {
                html += `
                <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                    <p class="font-bold text-slate-700 mb-2">👦 นักเรียนประเมินตนเอง</p>
                    <div class="grid grid-cols-5 gap-2 text-center text-xs">
                        <div class="bg-white p-2 rounded border"><div class="text-slate-400 mb-1">อารมณ์</div><div class="font-bold text-lg">${studentEval.scores.emotional}</div></div>
                        <div class="bg-white p-2 rounded border"><div class="text-slate-400 mb-1">ความประพฤติ</div><div class="font-bold text-lg">${studentEval.scores.conduct}</div></div>
                        <div class="bg-white p-2 rounded border"><div class="text-slate-400 mb-1">ไม่อยู่นิ่ง</div><div class="font-bold text-lg">${studentEval.scores.hyper}</div></div>
                        <div class="bg-white p-2 rounded border"><div class="text-slate-400 mb-1">เพื่อน</div><div class="font-bold text-lg">${studentEval.scores.peer}</div></div>
                        <div class="bg-white p-2 rounded border border-blue-200 bg-blue-50"><div class="text-blue-500 mb-1">สังคม (จุดแข็ง)</div><div class="font-bold text-lg text-blue-700">${studentEval.scores.prosocial}</div></div>
                    </div>
                    <p class="mt-3 text-sm">คะแนนรวม: <b>${studentEval.totalScore}</b> <span class="text-[10px] ml-2 px-2 py-0.5 rounded-full ${studentEval.status==='มีปัญหา'?'bg-red-100 text-red-700':'bg-green-100 text-green-700'}">${studentEval.status}</span></p>
                </div>`;
            }

            if(teacherEval) {
                html += `
                <div class="p-4 bg-emerald-50 rounded-xl border border-emerald-200">
                    <p class="font-bold text-emerald-800 mb-2">👨‍🏫 ครูประเมิน (${teacherEval.evaluator})</p>
                    <div class="grid grid-cols-5 gap-2 text-center text-xs">
                        <div class="bg-white p-2 rounded border border-emerald-100"><div class="text-slate-400 mb-1">อารมณ์</div><div class="font-bold text-lg">${teacherEval.scores.emotional}</div></div>
                        <div class="bg-white p-2 rounded border border-emerald-100"><div class="text-slate-400 mb-1">ความประพฤติ</div><div class="font-bold text-lg">${teacherEval.scores.conduct}</div></div>
                        <div class="bg-white p-2 rounded border border-emerald-100"><div class="text-slate-400 mb-1">ไม่อยู่นิ่ง</div><div class="font-bold text-lg">${teacherEval.scores.hyper}</div></div>
                        <div class="bg-white p-2 rounded border border-emerald-100"><div class="text-slate-400 mb-1">เพื่อน</div><div class="font-bold text-lg">${teacherEval.scores.peer}</div></div>
                        <div class="bg-white p-2 rounded border border-blue-200 bg-blue-50"><div class="text-blue-500 mb-1">สังคม (จุดแข็ง)</div><div class="font-bold text-lg text-blue-700">${teacherEval.scores.prosocial}</div></div>
                    </div>
                    <p class="mt-3 text-sm">คะแนนรวม: <b>${teacherEval.totalScore}</b> <span class="text-[10px] ml-2 px-2 py-0.5 rounded-full ${teacherEval.status==='มีปัญหา'?'bg-red-100 text-red-700':'bg-green-100 text-green-700'}">${teacherEval.status}</span></p>
                </div>`;
            }

            document.getElementById('deep-data-content').innerHTML = html;
        }

        async function submitTeacherSDQ() {
            const form = document.getElementById('teacher-sdq-form');
            const formData = new FormData(form);
            const scores = Array.from(formData.values()).map(Number);
            
            if(scores.length < 25) return Swal.fire('เตือน', 'กรุณาประเมินให้ครบ 25 ข้อ', 'warning');

            const btn = document.getElementById('btn-submit-teacher-sdq');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";

            // คำนวณรายด้าน (คร่าวๆ - ต้องใส่สูตรกลับด้าน 5 ข้อตามมาตรฐาน SDQ จริง)
            // สำหรับระบบต้นแบบ จะจำลองการคิดคะแนนรวม 4 ด้านลบด้านสังคม
            let emotional=0, conduct=0, hyper=0, peer=0, prosocial=0;
            // จำลองการแจกแจงคะแนน (ในระบบจริงต้องเขียน Map Index 25 ข้อให้ตรง)
            emotional = scores[2]+scores[7]+scores[12]+scores[15]+scores[23];
            conduct = scores[4]+scores[6]+scores[11]+scores[17]+scores[21];
            hyper = scores[1]+scores[9]+scores[14]+scores[19]+scores[24];
            peer = scores[5]+scores[10]+scores[13]+scores[18]+scores[22];
            prosocial = scores[0]+scores[3]+scores[8]+scores[16]+scores[20]; // จุดแข็ง

            const totalScore = emotional + conduct + hyper + peer; 
            let status = totalScore <= 13 ? "ปกติ" : (totalScore <= 16 ? "เสี่ยง" : "มีปัญหา");

            const payload = {
                studentId: currentViewingStudent.id,
                studentName: currentViewingStudent.name,
                totalScore: totalScore,
                status: status,
                scores: { emotional, conduct, hyper, peer, prosocial } 
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: 'saveSDQData', payload, evaluatorName: currentUser.name })
                });
                
                if((await res.json()).success) {
                    Swal.fire('สำเร็จ', 'บันทึกการประเมินของครูเรียบร้อยแล้ว', 'success');
                    openDeepData(currentViewingStudent.id, currentViewingStudent.name); // โหลดหน้ากราฟใหม่
                    loadStudents(); // รีเฟรชตารางหลังเพื่ออัปเดตป้ายสี
                }
            } catch(e) {
                Swal.fire('Error', 'ไม่สามารถบันทึกข้อมูลได้', 'error');
            } finally {
                btn.disabled = false; btn.innerText = "บันทึกผลประเมิน";
            }
        }

        function closeDeepData() {
            document.getElementById('deep-data-modal').classList.add('hidden');
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        window.onload = fetchRooms;
    </script>
