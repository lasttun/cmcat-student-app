<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  // ==========================================
  // ⚙️ GLOBAL STATE & UTILITIES
  // ==========================================
  let _cachedRooms = null;
  let _currentStudent = {};
  let _attendanceStudents = [];
  let _isSubmitting = false;
  let _currentTeacherName = 'ไม่ระบุ';

  function showLoader(status) {
    const loader = document.getElementById('loader');
    if (loader) loader.style.display = status ? 'flex' : 'none';
  }

  function backToMenu() {
    document.getElementById('menu-page').style.display = 'block';
    document.getElementById('module-container').style.display = 'none';
  }

  function setCurrentTeacher(name) {
    _currentTeacherName = name || 'ไม่ระบุ';
  }

  /**
   * ดึงข้อมูลห้องเรียน (พร้อมระบบ Caching เพื่อลดการโหลดเซิร์ฟเวอร์)
   */
  function getRooms(callback) {
    if (_cachedRooms) return callback(_cachedRooms);
    
    showLoader(true);
    google.script.run
      .withSuccessHandler(rooms => {
        _cachedRooms = rooms;
        callback(rooms);
      })
      .withFailureHandler(err => {
        showLoader(false);
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถโหลดข้อมูลห้องเรียนได้ กรุณารีเฟรชหน้าจอ', 'error');
      })
      .getRoomData();
  }

  function buildRoomOptions(rooms) {
    return rooms.map(r => `<option value="${r}">${r}</option>`).join('');
  }

  // ==========================================
  // 🚀 ROUTING & MODULE LOADER
  // ==========================================
  function loadModule(name) {
    document.getElementById('menu-page').style.display = 'none';
    document.getElementById('module-container').style.display = 'block';
    const content = document.getElementById('module-content');
    
    if (name === 'sdq') {
      getRooms(rooms => {
        let options = buildRoomOptions(rooms);
        content.innerHTML = `
          <div class="card p-4 shadow-sm border-0 rounded-4">
            <h4 class="text-primary fw-bold mb-3"><i class="fas fa-search me-2"></i>เลือกห้องเรียนเพื่อประเมิน SDQ</h4>
            <select id="room-select" class="form-select form-select-lg mb-3 shadow-sm" onchange="loadStudents(this.value)">
              <option value="">-- กรุณาเลือกห้องเรียน --</option>
              ${options}
            </select>
            <div id="student-list-container" class="mt-4"></div>
          </div>
        `;
        showLoader(false);
      });
    } 
    else if (name === 'attendance') {
      getRooms(rooms => {
        let options = buildRoomOptions(rooms);
        content.innerHTML = `
          <div class="card p-4 shadow-sm border-0 rounded-4">
            <h4 class="text-success fw-bold mb-3"><i class="fas fa-user-check me-2"></i>เช็คชื่อหน้าเสาธง</h4>
            <select id="room-select-att" class="form-select form-select-lg mb-3 shadow-sm" onchange="loadAttendanceList(this.value)">
              <option value="">-- เลือกห้องเรียน --</option>
              ${options}
            </select>
            <div id="attendance-container"></div>
          </div>`;
        showLoader(false);
      });
    } 
    else if (name === 'homevisit') {
      content.innerHTML = `
        <div class="card p-4 shadow-sm border-0 rounded-4 text-center">
            <h4 class="text-info fw-bold mb-3"><i class="fas fa-home me-2"></i>ระบบบันทึกเยี่ยมบ้าน</h4>
            <p class="text-muted">กำลังอยู่ในช่วงพัฒนา (Coming Soon)</p>
            <button class="btn btn-secondary mt-3" onclick="backToMenu()">กลับหน้าเมนู</button>
        </div>`;
    }
  }

  // ==========================================
  // 🧠 SDQ ASSESSMENT MODULE
  // ==========================================
  const sdqQuestions = [
    { text: "ห่วงใยความรู้สึกคนอื่น", type: "prosocial", reverse: false },
    { text: "อยู่ไม่นิ่ง นั่งนานไม่ได้", type: "hyper", reverse: false },
    { text: "มักจะบ่นว่าปวดหัว ปวดท้อง หรือคลื่นไส้", type: "emotional", reverse: false },
    { text: "เต็มใจแบ่งปันของให้เพื่อน", type: "prosocial", reverse: false },
    { text: "มักจะอาละวาด หรือโมโหร้าย", type: "conduct", reverse: false },
    { text: "ค่อนข้างแยกตัว ชอบเล่นคนเดียว", type: "peer", reverse: false },
    { text: "เชื่อฟัง มักจะทำตามที่ผู้ใหญ่ต้องการ", type: "conduct", reverse: true },
    { text: "กังวลใจหลายเรื่อง ดูมีความกังวลเสมอ", type: "emotional", reverse: false },
    { text: "เป็นที่พึ่งได้เมื่อคนอื่นเสียใจ", type: "prosocial", reverse: false },
    { text: "อยู่ไม่สุข วุ่นวายอย่างมาก", type: "hyper", reverse: false },
    { text: "มีเพื่อนสนิท", type: "peer", reverse: true },
    { text: "มักจะมีเรื่องทะเลาะวิวาทกับเด็กคนอื่น", type: "conduct", reverse: false },
    { text: "ดูมีความสุขน้อยลง ร้องไห้บ่อย", type: "emotional", reverse: false },
    { text: "เป็นที่รักของเพื่อนเด็กวัยเดียวกัน", type: "peer", reverse: true },
    { text: "วอกแวกง่าย สมาธิสั้น", type: "hyper", reverse: false },
    { text: "เครียดในสถานการณ์ใหม่ๆ เสียความมั่นใจง่าย", type: "emotional", reverse: false },
    { text: "ใจดีกับเด็กที่เล็กกว่า", type: "prosocial", reverse: false },
    { text: "มักจะถูกกล่าวหาว่าโกหกหรือขี้โกง", type: "conduct", reverse: false },
    { text: "ถูกเด็กคนอื่นรังแก หรือแกล้ง", type: "peer", reverse: false },
    { text: "มักจะอาสาช่วยเหลือคนอื่น", type: "prosocial", reverse: false },
    { text: "คิดก่อนทำ", type: "hyper", reverse: true },
    { text: "ขโมยของจากบ้าน โรงเรียน หรือที่อื่น", type: "conduct", reverse: false },
    { text: "เข้ากับผู้ใหญ่ได้ดีกว่าเด็กวัยเดียวกัน", type: "peer", reverse: false },
    { text: "มีความกลัวมาก ขี้กลัวง่าย", type: "emotional", reverse: false },
    { text: "ทำงานได้จนเสร็จ ความตั้งใจดี", type: "hyper", reverse: true }
  ];

  function loadStudents(roomName) {
    if (!roomName) return;
    showLoader(true);
    
    google.script.run
      .withSuccessHandler(students => {
        // ➔ เรียงลำดับรหัสประจำตัวจากน้อยไปหามาก
        students.sort((a, b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
        let listHtml = `
          <div class="list-group shadow-sm">
            <div class="list-group-item bg-light fw-bold text-secondary">รายชื่อนักเรียนในห้อง ${roomName}</div>
        `;
        
        students.forEach(std => {
          listHtml += `
            <button onclick="startSDQ('${std.id}', '${std.name}')" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
              <span>${std.id} - <strong>${std.name}</strong></span>
              <span class="badge bg-primary rounded-pill py-2 px-3 shadow-sm">ประเมิน <i class="fas fa-chevron-right ms-1"></i></span>
            </button>
          `;
        });
        
        listHtml += '</div>';
        document.getElementById('student-list-container').innerHTML = listHtml;
        showLoader(false);
      })
      .withFailureHandler(err => {
        showLoader(false);
        Swal.fire('เกิดข้อผิดพลาด', 'โหลดรายชื่อไม่สำเร็จ กรุณาลองใหม่', 'error');
      })
      .getStudentsInRoom(roomName);
  }

  function startSDQ(id, name) {
    _currentStudent = { id: id, name: name };
    
    let formHtml = `
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-warning bg-gradient text-dark fw-bold py-3">
          <i class="fas fa-clipboard-list me-2"></i>แบบประเมิน SDQ : ${name} <span class="badge bg-dark ms-2">${id}</span>
        </div>
        <div class="card-body p-3 p-md-4">
          <form id="sdq-form">
            <div class="table-responsive border rounded-3 mb-4">
              <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>ข้อคำถาม</th>
                  <th class="text-center" style="width: 90px;"><small>ไม่จริง</small></th>
                  <th class="text-center" style="width: 90px;"><small>จริงบ้าง</small></th>
                  <th class="text-center" style="width: 90px;"><small>จริงแน่นอน</small></th>
                </tr>
              </thead>
              <tbody>
    `;

    sdqQuestions.forEach((q, i) => {
      formHtml += `
        <tr>
          <td class="py-3">${i+1}. ${q.text}</td>
          <td class="text-center"><input type="radio" name="q${i}" value="0" required class="form-check-input" style="transform: scale(1.3);"></td>
          <td class="text-center"><input type="radio" name="q${i}" value="1" required class="form-check-input" style="transform: scale(1.3);"></td>
          <td class="text-center"><input type="radio" name="q${i}" value="2" required class="form-check-input" style="transform: scale(1.3);"></td>
        </tr>
      `;
    });

    formHtml += `
              </tbody>
            </table>
            </div>
            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-light border px-4" onclick="loadModule('sdq')">ยกเลิก</button>
              <button type="submit" id="btn-submit-sdq" class="btn btn-primary px-5 fw-bold shadow-sm">บันทึกผลประเมิน</button>
            </div>
          </form>
        </div>
      </div>
    `;

    document.getElementById('module-content').innerHTML = formHtml;
    document.getElementById('sdq-form').onsubmit = function(e) {
      e.preventDefault();
      calculateAndSaveSDQ();
    };
  }

  function calculateAndSaveSDQ() {
    if (_isSubmitting) return;
    
    const form = document.getElementById('sdq-form');
    const formData = new FormData(form);
    const btn = document.getElementById('btn-submit-sdq');
    
    _isSubmitting = true;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>กำลังบันทึก...';
    
    let scores = { emotional: 0, conduct: 0, hyper: 0, peer: 0, prosocial: 0 };
    
    sdqQuestions.forEach((q, i) => {
      let val = parseInt(formData.get(`q${i}`) || 0);
      if (q.reverse) val = 2 - val;
      scores[q.type] += val;
    });

    const totalScore = scores.emotional + scores.conduct + scores.hyper + scores.peer;
    let status = "ปกติ";
    if (totalScore >= 19) status = "มีปัญหา";
    else if (totalScore >= 16) status = "กลุ่มเสี่ยง";

    showLoader(true);
    google.script.run
      .withSuccessHandler(res => {
        showLoader(false);
        _isSubmitting = false;
        Swal.fire({
          title: 'บันทึกสำเร็จ!',
          html: `นักเรียน: <b>${_currentStudent.name}</b><br>คะแนนรวม: <b class="text-primary">${totalScore}</b><br>สถานะ: <span class="badge ${status==='ปกติ'?'bg-success': (status==='กลุ่มเสี่ยง'?'bg-warning text-dark':'bg-danger')}">${status}</span>`,
          icon: 'success',
          confirmButtonText: 'ประเมินคนต่อไป'
        }).then(() => {
          loadModule('sdq'); 
        });
      })
      .withFailureHandler(err => {
        showLoader(false);
        _isSubmitting = false;
        btn.disabled = false;
        btn.innerHTML = 'บันทึกผลประเมิน';
        Swal.fire('เกิดข้อผิดพลาด', 'บันทึกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      })
      .saveSDQData({
        studentId: _currentStudent.id,
        studentName: _currentStudent.name,
        scores: scores,
        totalScore: totalScore,
        status: status
      });
  }

  // ==========================================
  // 📝 ATTENDANCE MODULE
  // ==========================================
  function loadAttendanceList(roomName) {
    if (!roomName) return;
    showLoader(true);
    _isSubmitting = false;
    _attendanceStudents = [];

    google.script.run
      .withSuccessHandler(students => {
        // ➔ เรียงลำดับรหัสประจำตัวจากน้อยไปหามาก
        students.sort((a, b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
        _attendanceStudents = students;

// ตรวจสอบประวัติการเช็คชื่อของวันนี้
        google.script.run
          .withSuccessHandler(history => {
            const todayStr = new Date().toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const alreadyChecked = history.length > 0 && history.some(r => r[1] === todayStr);
            renderAttendanceList(students, roomName, alreadyChecked, history); // 🟢 ส่งประวัติไปด้วย
            showLoader(false);
          })
          .withFailureHandler(() => {
            renderAttendanceList(students, roomName, false, []);
            showLoader(false);
          })
          .getRoomHistory(roomName);
      })
      .withFailureHandler(err => {
        showLoader(false);
        Swal.fire('เกิดข้อผิดพลาด', 'โหลดรายชื่อไม่สำเร็จ กรุณาลองใหม่', 'error');
      })
      .getStudentsInRoom(roomName);
  }

function renderAttendanceList(students, roomName, alreadyChecked, history) {
    const statusOptions = [
      { value: 'มา',  label: 'มา',  cls: 'btn-outline-success' },
      { value: 'สาย', label: 'สาย', cls: 'btn-outline-warning' },
      { value: 'ลา',  label: 'ลา',  cls: 'btn-outline-info'    },
      { value: 'ขาด', label: 'ขาด', cls: 'btn-outline-danger'  }
    ];

    // 🧠 สร้างกล่องความจำสำหรับวันนี้: เช็คว่าเด็กแต่ละคนถูกบันทึกสถานะอะไรไปแล้ว
    let todayStatusMap = {};
    if (alreadyChecked && history && history.length > 0) {
        const todayStr = new Date().toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });
        history.forEach(r => {
            if (r[1] === todayStr) todayStatusMap[r[3]] = r[5]; // r[3] คือ Student_ID, r[5] คือ Status
        });
    }

    let warningHtml = alreadyChecked
      ? `<div class="alert alert-danger py-3 mb-3 shadow-sm border-danger">
           <i class="fas fa-lock me-2 fs-5"></i>
           <strong>ห้องนี้ถูกเช็คชื่อของวันนี้ไปเรียบร้อยแล้ว!</strong><br>
           <small>ระบบทำการล็อกการบันทึก เพื่อป้องกันข้อมูลซ้ำซ้อนจากครูที่ปรึกษาหลายท่าน</small>
         </div>` : '';

    let html = `
      ${warningHtml}
      <div class="d-flex justify-content-between align-items-center mb-3 p-2 bg-light rounded-3 border">
        <span class="text-muted fw-bold"><i class="fas fa-users me-2"></i>รายชื่อ ${students.length} คน</span>
        <button class="btn btn-sm btn-outline-success fw-bold shadow-sm" onclick="markAllStatus('มา')" ${alreadyChecked ? 'disabled' : ''}>
          <i class="fas fa-check-double me-1"></i>ติ๊ก 'มา' ทุกคน
        </button>
      </div>
      
      <div class="table-responsive border rounded-3 mb-4 shadow-sm">
        <table class="table table-hover align-middle mb-0" id="att-table">
          <thead class="table-dark">
            <tr>
              <th style="width:40%" class="ps-3">ชื่อ-นามสกุล</th>
              <th class="text-center">สถานะ</th>
            </tr>
          </thead>
          <tbody>`;

    students.forEach((std, i) => {
      // ➔ หากเช็คชื่อเรียบร้อยแล้ว ให้แถวตารางแสดงผลเป็นสีเทาพื้นอ่อน (table-light) ไร้สีสันสะดุดตา
      const rowClass = alreadyChecked ? 'table-light text-muted' : 'table-success';
      html += `<tr id="att-row-${i}" class="${rowClass} transition-all">
        <td class="ps-3 fw-medium">
            <span class="text-muted small me-1">${i + 1}.</span> ${std.name}
            <div class="text-muted small" style="font-size: 0.75rem;">${std.id}</div>
        </td>
        <td class="text-center py-2">
          <div class="btn-group btn-group-sm shadow-sm w-100 max-w-200" role="group">`;

statusOptions.forEach(opt => {
        // 🟢 ตรวจสอบว่าถ้าถูกเช็คชื่อไปแล้ว ให้ติ๊กปุ่มตรงกับที่บันทึกไว้ในฐานข้อมูลเป๊ะๆ
        let isChecked = false;
        if (alreadyChecked && todayStatusMap[std.id]) {
            isChecked = (opt.value === todayStatusMap[std.id]);
        } else {
            isChecked = (opt.value === 'มา'); // ค่าเริ่มต้นถ้ายังไม่ได้เช็คชื่อ
        }
        
        // ➔ หากเช็คชื่อเสร็จแล้วให้เปลี่ยนปุ่มสถานะทั้งหมดเป็นสีเทา (btn-outline-secondary) เพื่อป้องกันผู้ใช้สับสน
        const labelClass = alreadyChecked ? 'btn-outline-secondary opacity-60' : opt.cls;
        html += `
            <input type="radio" class="btn-check" name="status${i}" id="${opt.value}${i}" value="${opt.value}" ${isChecked ? 'checked' : ''} ${alreadyChecked ? 'disabled' : ''}
              onchange="highlightRow(${i}, '${opt.value}')">
            <label class="btn ${labelClass} px-2 py-1" for="${opt.value}${i}">${opt.label}</label>`;
      });

      html += `
          </div>
          <input type="hidden" id="id${i}" value="${std.id}">
          <input type="hidden" id="name${i}" value="${std.name}">
        </td>
      </tr>`;
    });

    html += `
          </tbody>
        </table>
      </div>

      <div class="sticky-bottom bg-white pt-3 pb-2 border-top shadow-lg px-3 mx-n3" style="z-index: 1020;">
        <div class="d-flex justify-content-center gap-3 mb-3 flex-wrap">
          <span class="badge bg-success bg-opacity-10 text-success border border-success px-3 py-2">มา <span id="cnt-มา" class="ms-1 fs-6">0</span></span>
          <span class="badge bg-warning bg-opacity-10 text-warning border border-warning px-3 py-2">สาย <span id="cnt-สาย" class="ms-1 fs-6">0</span></span>
          <span class="badge bg-info bg-opacity-10 text-info border border-info px-3 py-2">ลา <span id="cnt-ลา" class="ms-1 fs-6">0</span></span>
          <span class="badge bg-danger bg-opacity-10 text-danger border border-danger px-3 py-2">ขาด <span id="cnt-ขาด" class="ms-1 fs-6">0</span></span>
        </div>
        ${alreadyChecked 
          ? `<button class="btn btn-secondary w-100 py-3 fw-bold fs-5 shadow-sm rounded-3 cursor-not-allowed" disabled>
               <i class="fas fa-lock me-2"></i> วันนี้บันทึกข้อมูลเรียบร้อยแล้ว
             </button>` 
          : `<button id="btn-submit-att" class="btn btn-success w-100 py-3 fw-bold fs-5 shadow-sm rounded-3" onclick="submitAttendance()">
               <i class="fas fa-save me-2"></i> ยืนยันการบันทึกข้อมูล (${students.length} คน)
             </button>`
        }
      </div>`;

    document.getElementById('attendance-container').innerHTML = html;
    
    updateAttSummary();
  }

  function highlightRow(i, status) {
    const row = document.getElementById(`att-row-${i}`);
    row.classList.remove('table-success', 'table-warning', 'table-info', 'table-danger', 'table-light');
    
    // ➔ ตรวจสอบสถานะว่าปุ่มยืนยันปิดไปหรือยัง (บันทึกเสร็จแล้ว) ถ้าใช่ ให้คงสถานะแถวสีเทาอ่อนไร้สีสันไว้
    const isLocked = document.getElementById('btn-submit-att') ? false : true;
    if (isLocked) {
        row.classList.add('table-light');
        return;
    }
    
    const map = { 'มา': 'table-success', 'สาย': 'table-warning', 'ลา': 'table-info', 'ขาด': 'table-danger' };
    if (map[status]) row.classList.add(map[status]);
    updateAttSummary();
  }

  function updateAttSummary() {
    const counts = { 'มา': 0, 'สาย': 0, 'ลา': 0, 'ขาด': 0 };
    _attendanceStudents.forEach((_, i) => {
      const checked = document.querySelector(`input[name="status${i}"]:checked`);
      if (checked && counts[checked.value] !== undefined) counts[checked.value]++;
    });
    Object.keys(counts).forEach(k => {
      const el = document.getElementById(`cnt-${k}`);
      if (el) el.textContent = counts[k];
    });
  }

  function markAllStatus(status) {
    _attendanceStudents.forEach((_, i) => {
      const radio = document.getElementById(`${status}${i}`);
      if (radio) { 
        radio.checked = true; 
        highlightRow(i, status); 
      }
    });
    updateAttSummary();
  }

  function submitAttendance() {
    if (_isSubmitting) return;
    
    _isSubmitting = true;
    const btn = document.getElementById('btn-submit-att');
    if (btn) { 
        btn.disabled = true; 
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> กำลังประมวลผลการบันทึก...'; 
    }

    const records = _attendanceStudents.map((_, i) => ({
      id:     document.getElementById(`id${i}`).value,
      name:   document.getElementById(`name${i}`).value,
      status: document.querySelector(`input[name="status${i}"]:checked`)?.value || 'มา',
    }));

    showLoader(true);

    google.script.run
      .withSuccessHandler(res => {
        showLoader(false);
        _isSubmitting = false;
        Swal.fire({
          title: 'บันทึกสำเร็จ!',
          html: `เช็คชื่อ <b>${res.count}</b> คน เรียบร้อยแล้ว`,
          icon: 'success',
          timer: 2000,
          showConfirmButton: false,
        }).then(() => {
          // 🔄 ดึงชื่อห้องปัจจุบันที่กำลังเลือกอยู่
          const currentRoom = document.getElementById('room-select-att').value;
          // สั่งโหลดข้อมูลห้องนี้ใหม่ เพื่อให้ระบบเช็คประวัติและล็อกปุ่มเป็นสีเทาอัตโนมัติ
          loadAttendanceList(currentRoom); 
        });
      })
      .withFailureHandler(err => {
        showLoader(false);
        _isSubmitting = false;
        if (btn) { 
            btn.disabled = false; 
            btn.innerHTML = `<i class="fas fa-save me-2"></i> ยืนยันการบันทึกข้อมูล (${records.length} คน)`; 
        }
        Swal.fire('เกิดข้อผิดพลาด', 'บันทึกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'error');
      })
      .saveAttendance({ records: records, teacherName: _currentTeacherName });
  }
</script>
